# aiwt グローバル設定 (~/.config/aiwt/config.toml)
#
# 優先順位（低→高）: グローバル → <repo>/.aiwt.toml → 環境変数(AIWT_*) → CLIフラグ
# 全オプションとプレースホルダの一覧は aiwt リポジトリの config.example.toml を参照。

# AI 起動コマンド（{context_arg} はコンテキストファイルがあれば "$(cat <file>)" に展開）。
# 例: "aider {context_arg}" / "codex" などに差し替え可能。
ai_command = "claude {context_arg}"

# worktree 作成時に AI を自動起動するか（windows 未指定時のデフォルト構成に影響）。
auto_start_ai = true

# ベースブランチ。省略時は自動検出（origin/HEAD → main → master → 現在ブランチ）。
# base_branch = "main"

# worktree 置き場。省略時は <repo親>/worktrees。相対は repo 基準、絶対パス・~ 可。
# worktree_dir = "../worktrees"

# tmux セッション名のプレフィックス。
# session_prefix = ""

# ─────────────────────────────────────────────────────────────
# tmux のウィンドウ / ペイン構成（プロジェクト個別に上書きしたい場合は
# 各リポジトリの .aiwt.toml に書く）。コメントを外すとデフォルト構成より優先。
# ─────────────────────────────────────────────────────────────
# [[windows]]
# name = "code"
# layout = "main-vertical"
# panes = [
#   "claude {context_arg}",
#   "nvim .",
# ]
#
# [[windows]]
# name = "dev"
# panes = ["pnpm dev"]
